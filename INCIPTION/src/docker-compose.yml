## this is  a datta serialization language and it's a human readable
version: '1.0'
services:
  web:
  #webserver
    contaier_name: nginx ## this for siting the nginx configuration 
    image: nginx:latest
    port: 
      -"80:80"
    volumes:
      -./nginx/nginx.conf:/etc/nginx/nginx.conf 
      -./certs:/etc/nginx/certs
    restart: alwa
  #databie
    image: mariadb
    volumes:
      -
      -
    image: wordpres
    volumes:
      -
      -
    #website
    # container_name: wordpress
    # build:
    #       context: /wordpres
    #       dockerfile:dockerfile 
    depends_on:
      - db 
    image: wordpress:latest
    ports:
      -'8000:80'
    restart: always
    volumes:
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress


    #this is for reverse proxy
    reverse-proxy:
      image: nginx::latest
      container_name:reverse_proxy
      depends_on:
      
      volume:
        - ./reverse_proxy/nginx.conf:/etc/nginx/nginx.conf
      port:
        - 80:80

  database:

