# This configures the MariaDB user, password, port, and data path

[mysqld]
# User is typically set via environment, not in config file
# user=mysql is the standard, but Docker handles this

datadir=/var/lib/mysql

port=3306 # connection port

innodb_buffer_pool_size=256M # performance tuning

character-set-server=utf8mb4 # this is important for WordPress encoding

bind-address=0.0.0.0 # MariaDB listens on all networks/hosts
