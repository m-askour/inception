##this all the config nginx have https://nginx.org/en/docs/http/configuring_https_servers.html
#youtube part  https://www.youtube.com/watch?v=J9jKKeV1XVE&t=301s
worker_processes auto;

http {
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        listen              443 ssl;
        server_name         www.example.com;
        keepalive_timeout   70;

        ssl_certificate     /etc/nginx/certs/www.example.com.crt;
        ssl_certificate_key /etc/nginx/certs/www.example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    server {
        listen 80;
        server_name www.example.com;
        return 301 https://$server_name$request_uri;
    }
    #this server is for proxy
    server{
        listen 80;
        location /simple{ #this is just exemple of simple we can change it liter
            proxy_pass https://localhost:8080/simple/;
        }
    }
}