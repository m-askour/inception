##the socker composant is a file with type yml (YAMAL Aint Markup Language) we usse it to define the services and network and volumes[manage multiole continers application as a signal]
## this is  a datta serialization language and it's a human readable
version: '3.8'
services:
    nginx:
      container_name: nginx ## this for siting the nginx configuration 
      image: nginx:latest
      ports: 
        - "80:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf 
        - ./certs:/etc/nginx/certs
        - wp_volume:/var/www/html
      depends_on:
        - wordpress
      networks:
        - nginx_network
        - app_network
      restart: always
    mariadb:
      image: mariadb
      container_name: mariadb
      environment:
        MYSQL_DATABASE: wordpress
        MYSQL_USER: user
        MYSQL_PASSWORD: password
        MARIADB_ROOT_PASSWORD: password
      volumes:
        - mariadb_volume:/var/lib/mysql
      networks:
        - mariadb_network
      ports:
        - "3307:3306"
      restart: always
    wordpress:
      depends_on:
        - mariadb
      image: wordpress:latest
      container_name: wordpress
      restart: always
      environment:
        WORDPRESS_DB_HOST: mariadb:3306
        WORDPRESS_DB_NAME: wordpress
        WORDPRESS_DB_USER: user
        WORDPRESS_DB_PASSWORD: password
      volumes:
        - wp_volume:/var/www/html
      networks:
        - wordpress_network
        - app_network
      ports:
        - "8080:80"


volumes:
  mariadb_volume:
  wp_volume:
networks:
  mariadb_network:
  wordpress_network:
  nginx_network:
  app_network:

